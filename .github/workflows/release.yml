name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: Squiggle-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: Squiggle-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: Squiggle-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: Squiggle-osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish Squiggle.UI/Squiggle.UI.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:Version=${{ steps.version.outputs.version }}
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./${{ matrix.artifact }}.zip

      - name: Build Installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" Squiggle.Setup/Setup.iss

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: tar -czf ./${{ matrix.artifact }}.tar.gz -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ./${{ matrix.artifact }}.zip
            ./${{ matrix.artifact }}.tar.gz
            ./Squiggle.Setup/Output/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          files: |
            ./artifacts/**/*.zip
            ./artifacts/**/*.tar.gz
            ./artifacts/**/*.exe
