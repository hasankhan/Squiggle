name: CI

on:
  push:
    branches: [ master, 'modernize/**' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install .NET 9 x86 SDK for test host
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile dotnet-install.ps1
          ./dotnet-install.ps1 -Channel 9.0 -Architecture x86 -InstallDir 'C:\Program Files (x86)\dotnet'
          echo "DOTNET_ROOT_X86=C:\Program Files (x86)\dotnet" >> $env:GITHUB_ENV

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore (Full solution - Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet restore

      - name: Restore (Cross-platform projects)
        if: matrix.os != 'windows-latest'
        run: dotnet restore Squiggle.UI/Squiggle.UI.csproj

      - name: Build (Full solution - Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet build --no-restore --configuration Release

      - name: Build (Cross-platform projects)
        if: matrix.os != 'windows-latest'
        run: dotnet build Squiggle.UI/Squiggle.UI.csproj --no-restore --configuration Release

      - name: Test
        if: matrix.os == 'windows-latest'
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always() && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
          retention-days: 30
